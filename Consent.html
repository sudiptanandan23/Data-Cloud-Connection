<!DOCTYPE html>
<html>
<head>
<title>Consent Button Event - Data Cloud</title>

<!-- Salesforce Interactions SDK -->
<script src="https://cdn.c360a.salesforce.com/beacon/c360a/37350531-11e8-4591-a7b6-643ba484d8c5/scripts/c360a.min.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function() {

    SalesforceInteractions.init({
        cookieDomain: "sudiptanandan23.github.io"
    }).then(() => {
        console.log("SDK Initialized Successfully");
    });

});


function giveConsentAndSendEvent(){

    /* Send Consent to Data Cloud */
    SalesforceInteractions.updateConsents([
        {
            status: SalesforceInteractions.ConsentStatus.OptIn,
            purpose: SalesforceInteractions.ConsentPurpose.Tracking,
            provider: "Website Button Consent"
        }
    ]);

    /* Send Button Click Interaction */
    SalesforceInteractions.sendEvent({
        interaction: {
            name: "Consent Button Click"
        }
    });

    alert("Consent Sent to Salesforce Data Cloud!");

}

</script>

</head>

<body>

<h1>Salesforce Data Cloud Consent Example</h1>

<p>Click the button to give consent and send event.</p>

<button onclick="giveConsentAndSendEvent()">Accept Consent</button>

</body>
</html>
