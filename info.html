<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Info - Data Cloud Demo</title>

<link rel="stylesheet" href="style.css">

<!-- Salesforce Data Cloud SDK -->
<script src="https://cdn.c360a.salesforce.com/beacon/c360a/69c0fb79-bdf0-4fa4-ba65-9add3e7b5592/scripts/c360a.min.js"></script>

<script src="sdk.js"></script>

</head>

<body>

<header>
<h1>User Information</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a class="active" href="info.html">Info</a>
</nav>

<div class="container">

<h2>Submit Your Information</h2>

<form id="infoForm">

<label>First Name</label>
<input type="text" id="firstName" required>

<label>Last Name</label>
<input type="text" id="lastName" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Phone</label>
<input type="text" id="phone">

<button type="submit">Submit</button>

</form>

</div>

<script>

document.getElementById("infoForm").addEventListener("submit", function(e){

e.preventDefault();

const eventPayload = {

interaction: {
name: "UserInfoSubmit"
},

eventId: Date.now().toString(),

eventType: "UserSubmit",

category: "Profile",

dateTime: new Date().toISOString(),

deviceId: SalesforceInteractions.getDeviceId(),

sessionId: SalesforceInteractions.getSessionId(),

interactionName: "UserInfoSubmit",

sourceUrl: window.location.href,

sourceChannel: "Web",

attributes: {

firstName: document.getElementById("firstName").value,
lastName: document.getElementById("lastName").value,
email: document.getElementById("email").value,
phoneNumber: document.getElementById("phone").value

}

};

SalesforceInteractions.sendEvent(eventPayload);

alert("Information submitted successfully!");

});

</script>

<footer>
&copy; 2026 Data Cloud Demo
</footer>

</body>
</html>
