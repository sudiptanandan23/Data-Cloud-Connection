<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Info - Data Cloud Demo</title>

<link rel="stylesheet" href="style.css">

<!-- Salesforce Data Cloud SDK -->
<script src="https://cdn.c360a.salesforce.com/beacon/c360a/69c0fb79-bdf0-4fa4-ba65-9add3e7b5592/scripts/c360a.min.js"></script>

<script src="sdk.js"></script>

<style>

.cookie-banner{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#222;
color:white;
padding:15px;
text-align:center;
z-index:9999;
}

.cookie-banner button{
margin-left:10px;
padding:8px 15px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h1>User Information</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="info.html">Info</a>
</nav>

<div class="container">

<h2>Submit Your Information</h2>

<form id="userForm">

<input id="email" placeholder="Email" required>

<input id="firstName" placeholder="First Name">

<input id="lastName" placeholder="Last Name">

<button type="submit">Submit</button>

</form>

</div>

<!-- COOKIE BANNER -->

<div id="cookieBanner" class="cookie-banner" style="display:none">

This website uses cookies to improve experience.

<button id="acceptCookies">Accept</button>
<button id="rejectCookies">Reject</button>

</div>

<script>

/* ---------- COOKIE FUNCTIONS ---------- */

function setCookie(name,value,days){

let expires="";

if(days){

let date=new Date();

date.setTime(date.getTime()+(days*24*60*60*1000));

expires="; expires="+date.toUTCString();

}

document.cookie=name+"="+value+expires+"; path=/";

}

function getCookie(name){

let nameEQ=name+"=";

let ca=document.cookie.split(';');

for(let i=0;i<ca.length;i++){

let c=ca[i];

while(c.charAt(0)==' ') c=c.substring(1,c.length);

if(c.indexOf(nameEQ)==0)

return c.substring(nameEQ.length,c.length);

}

return null;

}


/* ---------- SEND CONSENT EVENT ---------- */

function sendConsent(status){

SalesforceInteractions.sendEvent({

interaction:{name:"ConsentLog"},

eventType:"Consent",

category:"Engagement",

eventId:Date.now().toString(),

dateTime:new Date().toISOString(),

deviceId:SalesforceInteractions.getDeviceId(),

sessionId:SalesforceInteractions.getSessionId(),

provider:"Website",

purpose:"Tracking",

status:status

});

}


/* ---------- SHOW COOKIE BANNER ---------- */

if(!getCookie("siteConsent")){

document.getElementById("cookieBanner").style.display="block";

}

document.getElementById("acceptCookies").onclick=function(){

setCookie("siteConsent","accepted",365);

sendConsent("OptIn");

document.getElementById("cookieBanner").style.display="none";

};

document.getElementById("rejectCookies").onclick=function(){

setCookie("siteConsent","rejected",365);

sendConsent("OptOut");

document.getElementById("cookieBanner").style.display="none";

};


/* ---------- FORM SUBMISSION ---------- */

document.getElementById("userForm").addEventListener("submit",function(e){

e.preventDefault();

const email=document.getElementById("email").value;

SalesforceInteractions.sendEvent({

interaction:{name:"FormSubmit"},

eventType:"Profile",

category:"Profile",

eventId:Date.now().toString(),

dateTime:new Date().toISOString(),

deviceId:SalesforceInteractions.getDeviceId(),

sessionId:SalesforceInteractions.getSessionId(),

interactionName:"FormSubmit",

sourceUrl:window.location.href,

user:{
identities:{
email:email
},

attributes:{
firstName:document.getElementById("firstName").value,
lastName:document.getElementById("lastName").value
}

}

});

alert("Information submitted!");

});

</script>

<footer>

© 2026 Data Cloud Demo

</footer>

</body>
</html>
