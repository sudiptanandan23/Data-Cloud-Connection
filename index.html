<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; }
        header { background: #3498db; color: #fff; padding: 1rem; text-align: center; }
        nav { background: #2980b9; text-align: center; padding: 0.5rem 0; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 800px; margin: 2rem auto; background: #fff; padding: 2rem; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
        section { margin-bottom: 2rem; }
        footer { background: #222; color: #fff; text-align: center; padding: 1rem 0; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Simple Website</h1>
    </header>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
    <div class="container">
        <section id="home">
            <h2>Home</h2>
            <p>This is a simple HTML and CSS template. You can customize it as you like!</p>
        </section>
        <section id="about">
            <h2>About</h2>
            <p>Write something about yourself or your website here.</p>
        </section>
        <section id="contact">
            <h2>Contact</h2>
            <p>Email: yourname@example.com</p>
        </section>
    </div>
    <footer>
        &copy; 2026 Your Name. All rights reserved.
    </footer>
</body>
</html>
