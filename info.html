<!DOCTYPE html>
<html>
<head>

<title>CTA Profile Viewer</title>

<!-- Salesforce Data Cloud SDK -->
<script src="https://cdn.c360a.salesforce.com/beacon/c360a/37350531-11e8-4591-a7b6-643ba484d8c5/scripts/c360a.min.js"></script>

<!-- Custom SDK Logic -->
<script src="sdk.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f7fb;
    text-align:center;
    margin-top:60px;
}

h1{
    margin-bottom:30px;
}

.btn{
    padding:12px 24px;
    margin:10px;
    font-size:16px;
    border:none;
    background:#c9d6e5;
    color:#333;
    border-radius:6px;
    cursor:pointer;
}

.btn.active{
    background:#0070d2;
    color:white;
}

.table-container{
    margin-top:40px;
    display:none;
}

table{
    margin:auto;
    border-collapse:collapse;
    width:60%;
    background:white;
}

th, td{
    padding:12px;
    border:1px solid #ddd;
}

th{
    background:#0070d2;
    color:white;
}

</style>

</head>

<body>

<h1>Customer Profile Viewer</h1>

<button id="ctaGoogle" class="btn">Google Profile</button>
<button id="ctaYahoo" class="btn">Yahoo Profile</button>
<button id="ctaBing" class="btn">Bing Profile</button>

<div id="profileTable" class="table-container">

<h2>Profile Information</h2>

<table>

<tr><th>Field</th><th>Value</th></tr>
<tr><td>Device ID</td><td id="deviceId"></td></tr>
<tr><td>Session ID</td><td id="sessionId"></td></tr>
<tr><td>Page URL</td><td id="sourceUrl"></td></tr>
<tr><td>Referrer</td><td id="referrer"></td></tr>
<tr><td>Interaction</td><td id="interactionName"></td></tr>
<tr><td>Date Time</td><td id="dateTime"></td></tr>

</table>

</div>

</body>
</html>
