<!DOCTYPE html>
<html>
<head>

<title>CTA Profile Viewer</title>

<!-- Salesforce Data Cloud SDK -->
<script src="https://cdn.c360a.salesforce.com/beacon/c360a/37350531-11e8-4591-a7b6-643ba484d8c5/scripts/c360a.min.js"></script>
<script src="sdk.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f7fb;
    text-align:center;
    margin-top:60px;
}

h1{
    margin-bottom:30px;
}

.btn{
    padding:12px 24px;
    margin:10px;
    font-size:16px;
    border:none;
    background:#c9d6e5;
    color:#333;
    border-radius:6px;
    cursor:pointer;
}

.btn.active{
    background:#0070d2;
    color:white;
}

.table-container{
    margin-top:40px;
    display:none;
}

table{
    margin:auto;
    border-collapse:collapse;
    width:60%;
    background:white;
}

th, td{
    padding:12px;
    border:1px solid #ddd;
}

th{
    background:#0070d2;
    color:white;
}

</style>

<script>

SalesforceInteractions.setLoggingLevel("DEBUG");

/* Initialize SDK */

SalesforceInteractions.init({

cookieDomain: ".github.io",

consents:[
{
status: SalesforceInteractions.ConsentStatus.OptIn,
purpose: SalesforceInteractions.ConsentPurpose.Tracking,
provider:"Website"
}
]

}).then(()=>{

console.log("Salesforce Data Cloud SDK initialized");

});

</script>

</head>

<body>

<h1>Customer Profile Viewer</h1>

<button id="ctaGoogle" class="btn">Google Profile</button>
<button id="ctaYahoo" class="btn">Yahoo Profile</button>
<button id="ctaBing" class="btn">Bing Profile</button>

<div id="profileTable" class="table-container">

<h2>Profile Information</h2>

<table>

<tr>
<th>Field</th>
<th>Value</th>
</tr>

<tr>
<td>Device ID</td>
<td id="deviceId"></td>
</tr>

<tr>
<td>Session ID</td>
<td id="sessionId"></td>
</tr>

<tr>
<td>Page URL</td>
<td id="sourceUrl"></td>
</tr>

<tr>
<td>Referrer</td>
<td id="referrer"></td>
</tr>

<tr>
<td>Interaction</td>
<td id="interactionName"></td>
</tr>

<tr>
<td>Date Time</td>
<td id="dateTime"></td>
</tr>

</table>

</div>

<script>

/* Wait until DOM is ready */

document.addEventListener("DOMContentLoaded", function(){

function trackCTA(event){

const button = event.target;
const interactionName = button.innerText;
const eventId = button.id;

/* Toggle active tab */

document.querySelectorAll(".btn").forEach(btn=>{
btn.classList.remove("active");
});

button.classList.add("active");

/* Generate device/session IDs */

let deviceId = localStorage.getItem("deviceId");
if(!deviceId){
deviceId = "device-" + Date.now();
localStorage.setItem("deviceId",deviceId);
}

let sessionId = sessionStorage.getItem("sessionId");
if(!sessionId){
sessionId = "session-" + Date.now();
sessionStorage.setItem("sessionId",sessionId);
}

const dateTime = new Date().toISOString();

/* Send event to Data Cloud */

SalesforceInteractions.sendEvent({

interaction:{
name:"CTA_Click"
},

eventId:eventId,
deviceId:deviceId,
sessionId:sessionId,
interactionName:interactionName,
sourceUrl:window.location.href,
sourceUrlReferrer:document.referrer,
dateTime:dateTime

});

console.log("CTA Event Sent");

/* Show profile table */

document.getElementById("profileTable").style.display="block";

document.getElementById("deviceId").innerText=deviceId;
document.getElementById("sessionId").innerText=sessionId;
document.getElementById("sourceUrl").innerText=window.location.href;
document.getElementById("referrer").innerText=document.referrer || "Direct";
document.getElementById("interactionName").innerText=interactionName;
document.getElementById("dateTime").innerText=dateTime;

}

/* Add click listeners */

document.getElementById("ctaGoogle").addEventListener("click",trackCTA);
document.getElementById("ctaYahoo").addEventListener("click",trackCTA);
document.getElementById("ctaBing").addEventListener("click",trackCTA);

});

</script>

</body>
</html>
